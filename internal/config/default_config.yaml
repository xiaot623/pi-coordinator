telegram:
  bot_token: ""
  group_chat_id: 0
  allowed_users: []

plugins:
  - "@hahahhh/pi-trace@next"

# 0 checks on every Pi startup; negative values disable update checks.
plugin_update_interval_minutes: 1440

runner:
  local:
    idle_timeout: 5m
    session_dir: "~/.pi/agent/sessions"
  worktree:
    idle_timeout: 5m
    session_dir: ""
  docker:
    idle_timeout: 5m
    session_dir: ""
    image: "pi-agent:latest"
    network: "bridge"
    agent_mount_mode: "rw"

open_tool: "iterm2"
global_model: ""

diff:
  delivery: send  # send | open | all
