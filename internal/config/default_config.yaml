telegram:
  bot_token: ""
  group_chat_id: 0
  allowed_users: []

runner:
  idle_timeout: 5m
  session_dir: "~/.pi/agent/sessions"
  binary: "pi"
  docker_image: "pi-agent:latest"
  plugins:
    - "@hahahhh/pi-trace@next"
  # 0 checks on every Pi startup; negative values disable update checks.
  plugin_update_interval_minutes: 1440

open_tool: "iterm2"
global_model: ""
